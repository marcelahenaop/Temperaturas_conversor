<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperaturas Conversor</title>
    <!-- Incluimos Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ocultar las flechas de los inputs numéricos (spinners) */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* --- ESTILOS DEL FONDO ANIMADO --- */
        .area {
            background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); /* Rojo vibrante a rojo oscuro */
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15); /* Figuras semi-transparentes */
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        /* Tamaños, posiciones y velocidades variadas para cada figura */
        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; border-radius: 50%; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; border-radius: 50%; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; border-radius: 50%; }
        .circles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; border-radius: 50%; }
        .circles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 relative">

    <!-- Contenedor del fondo animado -->
    <div class="area">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <!-- Tarjeta principal de la aplicación -->
    <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl w-full max-w-md p-8 transform transition-all hover:scale-[1.02]">
        
        <!-- Encabezado -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="bg-red-100 p-3 rounded-full mb-3 shadow-inner">
                <!-- Ícono de termómetro -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 11V5a3 3 0 116 0v6a5 5 0 11-6 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 11v3" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Temperaturas Conversor</h1>
        </div>

        <div class="space-y-5">
            <!-- Campo Celsius -->
            <div class="relative group">
                <label for="celsius" class="block text-sm font-semibold text-slate-600 mb-1 ml-1 group-hover:text-red-600 transition-colors">Grados Celsius (°C)</label>
                <div class="relative rounded-xl shadow-sm">
                    <input type="number" id="celsius" placeholder="Ej: 25" 
                        class="block w-full rounded-xl border-slate-200 pl-4 pr-12 py-3 bg-slate-50 border-2 focus:border-red-500 focus:ring-red-500 focus:bg-white transition-all text-lg outline-none" />
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4">
                        <span class="text-slate-400 font-bold text-lg">°C</span>
                    </div>
                </div>
            </div>

            <!-- Campo Fahrenheit -->
            <div class="relative group">
                <label for="fahrenheit" class="block text-sm font-semibold text-slate-600 mb-1 ml-1 group-hover:text-red-600 transition-colors">Grados Fahrenheit (°F)</label>
                <div class="relative rounded-xl shadow-sm">
                    <input type="number" id="fahrenheit" placeholder="Ej: 77" 
                        class="block w-full rounded-xl border-slate-200 pl-4 pr-12 py-3 bg-slate-50 border-2 focus:border-red-500 focus:ring-red-500 focus:bg-white transition-all text-lg outline-none" />
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4">
                        <span class="text-slate-400 font-bold text-lg">°F</span>
                    </div>
                </div>
            </div>

            <!-- Campo Kelvin -->
            <div class="relative group">
                <label for="kelvin" class="block text-sm font-semibold text-slate-600 mb-1 ml-1 group-hover:text-red-600 transition-colors">Kelvin (K)</label>
                <div class="relative rounded-xl shadow-sm">
                    <input type="number" id="kelvin" placeholder="Ej: 298.15" 
                        class="block w-full rounded-xl border-slate-200 pl-4 pr-12 py-3 bg-slate-50 border-2 focus:border-red-500 focus:ring-red-500 focus:bg-white transition-all text-lg outline-none" />
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4">
                        <span class="text-slate-400 font-bold text-lg">K</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botón limpiar -->
        <div class="mt-6 text-center">
            <button id="btn-limpiar" class="px-4 py-2 text-sm text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-semibold transition-colors">
                Limpiar campos
            </button>
        </div>

        <!-- Créditos del creador -->
        <div class="mt-8 pt-5 border-t border-slate-100 text-center">
            <p class="text-sm font-medium text-slate-500">
                Creado por <span class="text-red-600 font-bold">Marcela Henao</span>
            </p>
            <p class="text-xs text-slate-400 mt-1 flex items-center justify-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                asistido por Gemini IA
            </p>
        </div>
    </div>

    <script>
        // Referencias a los elementos del DOM
        const inputCelsius = document.getElementById('celsius');
        const inputFahrenheit = document.getElementById('fahrenheit');
        const inputKelvin = document.getElementById('kelvin');
        const btnLimpiar = document.getElementById('btn-limpiar');

        // Función para redondear a 2 decimales
        const redondear = (num) => Math.round(num * 100) / 100;

        // Limpiar todos los campos
        const limpiarCampos = () => {
            inputCelsius.value = '';
            inputFahrenheit.value = '';
            inputKelvin.value = '';
        };

        btnLimpiar.addEventListener('click', limpiarCampos);

        // Lógica de conversión desde Celsius
        inputCelsius.addEventListener('input', (e) => {
            const valor = parseFloat(e.target.value);
            if (isNaN(valor)) {
                inputFahrenheit.value = '';
                inputKelvin.value = '';
                return;
            }
            inputFahrenheit.value = redondear((valor * 9/5) + 32);
            inputKelvin.value = redondear(valor + 273.15);
        });

        // Lógica de conversión desde Fahrenheit
        inputFahrenheit.addEventListener('input', (e) => {
            const valor = parseFloat(e.target.value);
            if (isNaN(valor)) {
                inputCelsius.value = '';
                inputKelvin.value = '';
                return;
            }
            inputCelsius.value = redondear((valor - 32) * 5/9);
            inputKelvin.value = redondear((valor - 32) * 5/9 + 273.15);
        });

        // Lógica de conversión desde Kelvin
        inputKelvin.addEventListener('input', (e) => {
            const valor = parseFloat(e.target.value);
            if (isNaN(valor)) {
                inputCelsius.value = '';
                inputFahrenheit.value = '';
                return;
            }
            inputCelsius.value = redondear(valor - 273.15);
            inputFahrenheit.value = redondear((valor - 273.15) * 9/5 + 32);
        });
    </script>
</body>
</html>
